name: 🧪 CI/CD 测试

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 📦 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: 📥 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 🔍 代码检查
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          
      - name: 🧪 运行测试
        run: |
          pip install pytest
          pytest regression_test.py -v || echo "No tests found"
          
      - name: ✅ 验证导入
        run: |
          python -c "import clients; print('✓ clients.py OK')"
          python -c "import data_engine; print('✓ data_engine.py OK')"
          python -c "import quant_master; print('✓ quant_master.py OK')"
